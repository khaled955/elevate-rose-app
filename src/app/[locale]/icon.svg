<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a0a0a"/>

  <!-- Stem -->
  <line x1="16" y1="26" x2="16" y2="20" stroke="#2d5a1b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M16 23 Q13 21 12 19 Q14 20 16 23Z" fill="#2d5a1b"/>

  <!-- Rose petals - outer -->
  <ellipse cx="16" cy="15" rx="5.5" ry="4" fill="#7a1228" opacity="0.9"/>
  <ellipse cx="16" cy="15" rx="5.5" ry="4" fill="#7a1228" transform="rotate(60 16 15)" opacity="0.85"/>
  <ellipse cx="16" cy="15" rx="5.5" ry="4" fill="#7a1228" transform="rotate(120 16 15)" opacity="0.85"/>

  <!-- Rose petals - middle -->
  <ellipse cx="16" cy="15" rx="4" ry="3" fill="#9b1535" transform="rotate(30 16 15)"/>
  <ellipse cx="16" cy="15" rx="4" ry="3" fill="#9b1535" transform="rotate(90 16 15)"/>
  <ellipse cx="16" cy="15" rx="4" ry="3" fill="#9b1535" transform="rotate(150 16 15)"/>

  <!-- Rose center -->
  <circle cx="16" cy="15" r="2.5" fill="#b01d42"/>
  <circle cx="16" cy="15" r="1.2" fill="#c4254e"/>
  <circle cx="15.5" cy="14.5" r="0.5" fill="#d44060" opacity="0.7"/>
</svg>
